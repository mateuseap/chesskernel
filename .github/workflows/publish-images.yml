name: Publish images to GHCR

# Builds the production images the homelab cluster runs:
#   ghcr.io/mateuseap/chesskernel-server
#   ghcr.io/mateuseap/chesskernel-client
# Deployed by ArgoCD from https://github.com/mateuseap/homelab
# (tracks :latest; after merge run: kubectl -n chesskernel rollout restart deploy)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [server, client]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chesskernel-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository_owner }}/chesskernel-${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
