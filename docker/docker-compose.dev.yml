services:
  postgres:
    image: postgres:16-alpine
    container_name: chesskernel_postgres_dev
    environment:
      POSTGRES_USER: chesskernel
      POSTGRES_PASSWORD: chesskernel
      POSTGRES_DB: chesskernel
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chesskernel']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chesskernel_redis_dev
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
